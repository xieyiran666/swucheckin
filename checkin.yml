name: SWU Check-in

on:
  schedule:
    # Run daily at 21:10 Beijing time (13:10 UTC)
    - cron: '10 13 * * *'
  workflow_dispatch:

jobs:
  check-in:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check-in
        env:
          TZ: Asia/Shanghai
          SWU_USERNAME: ${{ secrets.SWU_USERNAME }}
          SWU_PASSWORD: ${{ secrets.SWU_PASSWORD }}
        run: python -u scripts/check_in.py
